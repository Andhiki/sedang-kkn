# Multi-location check-in configuration.
# Copy this file to locations.yaml and fill in your group's KKN sites.
#
# Each location has a QR code value + GPS coordinates + radius (meters).
# user_locations maps each username to a location name.
# default_location is used for any username not listed in user_locations.
#
# If locations.yaml is absent, the tool falls back to the single-location
# env vars (QR_CODE_VALUE, KKN_LOCATION_LATITUDE, KKN_LOCATION_LONGITUDE, KKN_LOCATION_RADIUS_METERS).

locations:
  site_a:
    qr_value: 123456
    latitude: -6.200000
    longitude: 106.816666
    radius: 50

  site_b:
    qr_value: 654321
    latitude: -6.900000
    longitude: 107.600000
    radius: 50

user_locations:
  user1: site_a
  user2: site_a
  user3: site_b

default_location: site_a
