name: Proker Presensi (Today)

on:
  schedule:
    # 08:00 WIB = 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  proker-presensi-today:
    if: vars.PRESENSI_FILTER_MODE == 'today'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync

      - name: Write locations.yaml
        if: ${{ vars.LOCATIONS_YAML != '' }}
        run: |
          printf '%s' "${{ vars.LOCATIONS_YAML }}" > locations.yaml

      - name: Run proker presensi (today mode)
        env:
          SIMASTER_USERNAME: ${{ secrets.SIMASTER_USERNAME }}
          SIMASTER_PASSWORD: ${{ secrets.SIMASTER_PASSWORD }}
          SIMASTER_CLIENT_ID: ${{ secrets.SIMASTER_CLIENT_ID }}
          SIMASTER_CLIENT_SECRET: ${{ secrets.SIMASTER_CLIENT_SECRET }}
          SIMASTER_CREDENTIALS: ${{ secrets.SIMASTER_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          AI_PROVIDER: "ollama"
          IDEMPOTENT: "true"
          THROTTLE: "true"
          SHUFFLE: "true"
          MAX_RETRIES: "3"
          PRESENSI_FILTER_MODE: "today"
        run: uv run python src/main.py --proker_presensi --headless

      - name: Upload proker reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kkn-proker-reports-today
          path: reports/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kkn-proker-logs-today
          path: logs/
          retention-days: 7
          if-no-files-found: warn